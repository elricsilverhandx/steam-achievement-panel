name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: steam-achievement-panel-macos-arm64
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: steam-achievement-panel-macos-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: steam-achievement-panel-windows-x64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: steam-achievement-panel-linux-x64

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libasound2-dev libx11-dev libxkbcommon-x11-dev
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package macOS DMG
        if: runner.os == 'macOS'
        run: bash scripts/package-macos.sh ${{ matrix.target }} ${{ matrix.artifact }}
      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: pwsh scripts/package-windows.ps1 ${{ matrix.target }} ${{ matrix.artifact }}
      - name: Package Linux
        if: runner.os == 'Linux'
        run: bash scripts/package-linux.sh ${{ matrix.target }} ${{ matrix.artifact }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
